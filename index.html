<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA-CIT Feedback Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="portal-wrapper">
        
        <div class="branding-panel">
            <h2>UA-CIT</h2>
            <p>Welcome to the College of Information Technology Office Feedback Survey Portal. Your insights and experiences help us build a better IT environment.</p>
        </div>

        <div class="form-panel">
            <form id="feedbackForm">
                
                <div class="form-group">
                    <label>Classification *</label>
                    <select id="classification" required>
                        <option value="" disabled selected>Select your affiliation...</option>
                        <option value="Student">Student</option>
                        <option value="Guardian">Guardian</option>
                        <option value="Others">Others</option>
                    </select>
                </div>

                <div class="form-group" id="otherClassGroup" style="display: none; margin-top: -10px;">
                    <input type="text" id="otherClassification" placeholder="Please specify your classification...">
                </div>

                <div class="optional-box">
                    <p class="optional-msg">Optional: Please provide your name and email address if you would like a direct response from the CIT Office.</p>
                    
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Leave blank to remain anonymous">
                    </div>
                    
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="Leave blank to remain anonymous">
                    </div>
                </div>

                <div class="form-group">
                    <label>Service Rating *</label>
                    <select id="rating" required>
                        <option value="" disabled selected>Rate your experience...</option>
                        <option value="5">⭐⭐⭐⭐⭐ (5) - Excellent</option>
                        <option value="4">⭐⭐⭐⭐ (4) - Good</option>
                        <option value="3">⭐⭐⭐ (3) - Average</option>
                        <option value="2">⭐⭐ (2) - Fair</option>
                        <option value="1">⭐ (1) - Poor</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Feedback Message *</label>
                    <textarea id="feedbackText" placeholder="Share your encrypted message here..." required></textarea>
                </div>
                
                <button type="submit" id="submitBtn">Submit Securely</button>
            </form>
            
            <div id="status"></div>
        </div>

    </div>

    <script>
        const classDropdown = document.getElementById('classification');
        const otherGroup = document.getElementById('otherClassGroup');
        const otherInput = document.getElementById('otherClassification');

        classDropdown.addEventListener('change', function() {
            if (this.value === 'Others') {
                otherGroup.style.display = 'block';
                otherInput.required = true; 
            } else {
                otherGroup.style.display = 'none';
                otherInput.required = false;
                otherInput.value = ''; 
            }
        });

        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('status');
            btn.innerText = "⏳ Encrypting Data...";
            btn.disabled = true;

            let finalClassification = document.getElementById('classification').value;
            if (finalClassification === 'Others') {
                finalClassification = document.getElementById('otherClassification').value.trim();
            }

            const rawName = document.getElementById('name').value.trim();
            const rawEmail = document.getElementById('email').value.trim();

            const payload = {
                classification: finalClassification,
                name: rawName === "" ? "Anonymous" : rawName,
                email: rawEmail === "" ? "Not provided" : rawEmail,
                rating: document.getElementById('rating').value,
                feedbackText: document.getElementById('feedbackText').value
            };

            try {
                // Secure connection to your Render vault
                const BACKEND_URL = 'https://cit-feedback-survey-backend.onrender.com/api/feedback';

                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusBox.innerText = "✅ Feedback Submitted Successfully!";
                    statusBox.style.background = "#ecfdf5";
                    statusBox.style.color = "var(--success)";
                    
                    e.target.reset();
                    otherGroup.style.display = 'none';
                    otherInput.required = false;
                } else {
                    throw new Error('Server rejected');
                }
            } catch (err) {
                statusBox.innerText = "❌ Connection error. Please try again.";
                statusBox.style.background = "#fef2f2";
                statusBox.style.color = "var(--danger)";
            } finally {
                btn.innerText = "Submit Securely";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
